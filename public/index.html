<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> 학급 선택</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A5%9A%3C/text%3E%3C/svg%3E">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 520px;
      padding: 24px;
    }
    h1 {
      text-align: center;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }
    .class-btn {
      border: none;
      border-radius: 20px;
      padding: 26px 10px;
      font-size: 20px;
      font-weight: bold;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: 0.15s;
    }
    .class-btn:hover { background: #e0e7ff; }
    .class-btn:active { transform: scale(0.95); }
    .loading {
      text-align: center;
      color: #64748b;
      margin-top: 20px;
    }
    .error {
      text-align: center;
      color: #ef4444;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🥚 학급 선택</h1>
  <div id="grid" class="grid"></div>
  <div id="loading" class="loading">불러오는 중...</div>
  <div id="error" class="error" style="display:none"></div>
</div>

<script>
async function loadClasses() {
  try {
    const res = await fetch('/api/classes');
    if (!res.ok) throw new Error('서버 오류');
    const classes = await res.json();

    const grid = document.getElementById('grid');
    const loading = document.getElementById('loading');
    loading.style.display = 'none';
    grid.innerHTML = '';

    classes.forEach(c => {
      const [grade, classNum] = c.split('-');
      const btn = document.createElement('button');
      btn.className = 'class-btn';
      btn.innerText = `${grade}학년 ${classNum}반`;
      btn.onclick = () => {
        window.location.href = `/class.html?grade=${grade}&class=${classNum}`;
      };
      grid.appendChild(btn);
    });
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error');
    errEl.style.display = 'block';
    errEl.innerText = '불러오기 실패: ' + err.message;
  }
}

loadClasses();
</script>
</body>
</html>
